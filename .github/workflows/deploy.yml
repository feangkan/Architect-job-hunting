name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - cursor/architect-job-hunting-app-f7d0
      - cursor/pr-company-matcher-pr-analyzer-5423

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; skip queued runs but don't cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          GITHUB_ACTIONS: true
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
